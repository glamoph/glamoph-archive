<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">GLAMOPH — Verify</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="archive.css?v=10" />

  <style>
    .collector-gate {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(244, 241, 234, 0.96);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .collector-gate.is-active {
      display: flex;
    }

    .collector-gate__panel {
      width: 100%;
      max-width: 540px;
      text-align: center;
      padding: 40px 28px 34px;
      border: 1px solid rgba(20, 20, 20, 0.08);
      background: rgba(244, 241, 234, 0.98);
    }

    .collector-gate__label {
      margin: 0 0 14px;
      font-size: 11px;
      line-height: 1.2;
      letter-spacing: 0.14em;
      font-weight: 500;
      color: #6b665f;
      text-transform: uppercase;
    }

    .collector-gate__title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(38px, 5vw, 58px);
      line-height: 0.95;
      font-weight: 300;
      color: #141414;
    }

    .collector-gate__text {
      max-width: 34ch;
      margin: 18px auto 0;
      font-size: 12px;
      line-height: 1.75;
      letter-spacing: 0.03em;
      color: #6b665f;
    }

    .collector-gate__button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 220px;
      margin-top: 28px;
      padding: 13px 22px;
      border: 1px solid rgba(20, 20, 20, 0.16);
      background: #141414;
      color: #f4f1ea;
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.14em;
      font-weight: 500;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .collector-gate__button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .archive-owner-note {
      margin-top: 8px;
      font-size: 10px;
      line-height: 1.4;
      letter-spacing: 0.12em;
      color: rgba(107, 102, 95, 0.92);
      text-transform: uppercase;
    }

    .archive-shell.is-owner .archive-status {
      color: #141414;
    }

    .archive-shell.is-owner-claimed .archive-signature-wrap {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 700ms ease, transform 700ms ease;
    }

    .archive-shell.is-owner-claimed.reveal-complete .archive-signature-wrap {
      opacity: 1;
      transform: translateY(0);
    }

    .archive-shell.is-owner-claimed .archive-title,
    .archive-shell.is-owner-claimed .archive-meta-line,
    .archive-shell.is-owner-claimed .archive-artwork,
    .archive-shell.is-owner-claimed .archive-record,
    .archive-shell.is-owner-claimed .archive-footer {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 520ms ease, transform 520ms ease;
    }

    .archive-shell.is-owner-claimed.reveal-complete .archive-title,
    .archive-shell.is-owner-claimed.reveal-complete .archive-meta-line,
    .archive-shell.is-owner-claimed.reveal-complete .archive-artwork,
    .archive-shell.is-owner-claimed.reveal-complete .archive-record,
    .archive-shell.is-owner-claimed.reveal-complete .archive-footer {
      opacity: 1;
      transform: translateY(0);
    }

    .archive-shell.is-owner-claimed.reveal-complete .archive-meta-line {
      transition-delay: 120ms;
    }

    .archive-shell.is-owner-claimed.reveal-complete .archive-artwork {
      transition-delay: 180ms;
    }

    .archive-shell.is-owner-claimed.reveal-complete .archive-record {
      transition-delay: 240ms;
    }

    .archive-shell.is-owner-claimed.reveal-complete .archive-footer {
      transition-delay: 300ms;
    }

    .archive-shell.is-owner-claimed.reveal-complete .archive-signature-wrap {
      transition-delay: 520ms;
    }

    @media (max-width: 820px) {
      .collector-gate__panel {
        padding: 34px 22px 28px;
      }

      .collector-gate__text {
        max-width: 28ch;
      }

      .collector-gate__button {
        width: 100%;
        min-width: 0;
      }
    }

    @media print {
      .collector-gate {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="collectorGate" class="collector-gate" aria-hidden="true">
    <div class="collector-gate__panel">
      <p class="collector-gate__label" id="collectorGateLabel">Collector Access</p>
      <h2 class="collector-gate__title" id="collectorGateTitle">—</h2>
      <p class="collector-gate__text">
        This collector record is ready to be claimed.
      </p>
      <button id="claimBtn" class="collector-gate__button" type="button">
        Claim This Record
      </button>
    </div>
  </div>

  <main class="archive-page">
    <section class="archive-sheet" aria-label="GLAMOPH archive record">
      <div class="archive-shell" id="archiveShell">

        <header class="archive-header">
          <p class="archive-status" id="verified">Loading…</p>
          <p class="archive-owner-note" id="ownerNote" hidden></p>
        </header>

        <section class="archive-hero">
          <div class="archive-hero__content">
            <h1 class="archive-title" id="title">—</h1>

            <div class="archive-meta-line">
              <p class="archive-meta-item">
                <span class="archive-meta-label">Artwork ID</span>
                <span class="archive-meta-value" id="artworkId">—</span>
              </p>

              <p class="archive-meta-divider">/</p>

              <p class="archive-meta-item">
                <span class="archive-meta-label">Edition</span>
                <span class="archive-meta-value" id="edition">—</span>
              </p>
            </div>
          </div>

          <figure class="archive-artwork">
            <img id="image" alt="" />
          </figure>
        </section>

        <section class="archive-record">
          <div class="archive-record__inner">
            <div class="archive-record__heading-wrap">
              <h2 class="archive-record__heading">Record</h2>
            </div>

            <dl class="archive-record__grid" id="record"></dl>
          </div>
        </section>

        <footer class="archive-footer">
          <button class="archive-download" id="downloadBtn" type="button">
            Download PDF
          </button>

          <div class="archive-signature-wrap">
            <img
              class="archive-signature"
              id="signature"
              src="assets/signature.png"
              alt="GLAMOPH signature"
            />
          </div>
        </footer>

      </div>
    </section>
  </main>

  <script>
    (function () {
      const RECORDS_DIR = "records";

      const els = {
        shell: document.getElementById("archiveShell"),
        verified: document.getElementById("verified"),
        ownerNote: document.getElementById("ownerNote"),
        title: document.getElementById("title"),
        artworkId: document.getElementById("artworkId"),
        edition: document.getElementById("edition"),
        image: document.getElementById("image"),
        record: document.getElementById("record"),
        downloadBtn: document.getElementById("downloadBtn"),
        signature: document.getElementById("signature"),
        collectorGate: document.getElementById("collectorGate"),
        collectorGateTitle: document.getElementById("collectorGateTitle"),
        claimBtn: document.getElementById("claimBtn")
      };

      const state = {
        publicId: null,
        token: null,
        isOwnerEntry: false,
        isOwnerClaimed: false,
        claimKey: null
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function isProbablyGithubProjectPath() {
        return /\.github\.io$/i.test(window.location.hostname);
      }

      function getBasePath() {
        const segments = window.location.pathname.split("/").filter(Boolean);

        if (isProbablyGithubProjectPath() && segments.length > 0) {
          return "/" + segments[0];
        }

        return "";
      }

      function getIdFromUrl() {
        const params = new URLSearchParams(window.location.search);

        const querySlug = params.get("slug");
        if (querySlug) return querySlug.trim();

        const queryId = params.get("id");
        if (queryId) return queryId.trim();

        const segments = window.location.pathname
          .split("/")
          .filter(Boolean)
          .map(decodeURIComponent);

        if (segments.length === 0) {
          return null;
        }

        const last = segments[segments.length - 1];

        if (
          last &&
          last !== "index.html" &&
          last !== "404.html" &&
          !last.endsWith(".html")
        ) {
          return last.trim();
        }

        return null;
      }

      function getTokenFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const token = params.get("t");
        return token ? token.trim() : "";
      }

      function getClaimKey(publicId, token) {
        return `glamoph_claimed_${publicId}_${token}`;
      }

      function resolveAssetPath(fileName, type = "generic") {
        if (!fileName) return "";

        if (/^(https?:)?\/\//i.test(fileName)) {
          return fileName;
        }

        const basePath = getBasePath();

        if (fileName.startsWith("/")) {
          return `${basePath}${fileName}`;
        }

        if (fileName.startsWith("./")) {
          return `${basePath}/${fileName.replace(/^\.\//, "")}`;
        }

        if (fileName.startsWith("../")) {
          return fileName;
        }

        if (type === "signature") {
          return `${basePath}/assets/${fileName.split("/").pop()}`;
        }

        if (type === "image") {
          return `${basePath}/images/${fileName.split("/").pop()}`;
        }

        return `${basePath}/${fileName}`;
      }

      async function resolveRecordPath(id, basePath) {
        const response = await fetch(`${basePath}/records-log.json`, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const log = await response.json();
        return log[id] || null;
      }

      function buildRecordRows(data) {
        const rows = [
          { label: "Title", value: data.title },
          { label: "Artist", value: data.artist },
          { label: "Medium", value: data.medium },
          { label: "Size", value: data.size },
          { label: "Frame", value: data.frame },
          { label: "Archive Date", value: data.archiveDate },
          { label: "Archive URL", value: data.archiveUrl, isUrl: true }
        ].filter((row) => {
          return row.value !== undefined && row.value !== null && String(row.value).trim() !== "";
        });

        return rows.map((row) => {
          if (row.isUrl) {
            const safeText = escapeHtml(row.value);
            const href = escapeHtml(row.value);

            return `
              <div class="archive-record__row archive-record__row--url">
                <dt>${escapeHtml(row.label)}</dt>
                <dd><a href="${href}" target="_blank" rel="noopener noreferrer">${safeText}</a></dd>
              </div>
            `;
          }

          return `
            <div class="archive-record__row">
              <dt>${escapeHtml(row.label)}</dt>
              <dd>${escapeHtml(row.value)}</dd>
            </div>
          `;
        }).join("");
      }

      function applyOwnerStateLabels() {
        els.ownerNote.hidden = true;
        els.ownerNote.textContent = "";

        if (!state.token) {
          els.verified.textContent = "Public Archive";
          els.shell.classList.remove("is-owner", "is-owner-claimed", "reveal-complete");
          return;
        }

        els.shell.classList.add("is-owner");

        if (state.isOwnerClaimed) {
          els.verified.textContent = "Collector View";
          els.ownerNote.textContent = "Recorded for collector access";
          els.ownerNote.hidden = false;
          els.shell.classList.add("is-owner-claimed");
        } else {
          els.verified.textContent = "Collector Access";
          els.ownerNote.textContent = "Awaiting collector claim";
          els.ownerNote.hidden = false;
          els.shell.classList.remove("is-owner-claimed", "reveal-complete");
        }
      }

      function runClaimReveal() {
        requestAnimationFrame(() => {
          setTimeout(() => {
            els.shell.classList.add("reveal-complete");
          }, 220);
        });
      }

      function openCollectorGate(title) {
        els.collectorGateTitle.textContent = title || "Collector Record";
        els.collectorGate.classList.add("is-active");
        els.collectorGate.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeCollectorGate() {
        els.collectorGate.classList.remove("is-active");
        els.collectorGate.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      function applyData(data, publicId) {
        const resolvedTitle = data.title || "Untitled";
        const resolvedArtworkId = data.archiveId || publicId;
        const resolvedEdition =
          (data.editionNumber && data.editionTotal)
            ? `${String(data.editionNumber).padStart(2, "0")} / ${data.editionTotal}`
            : (data.edition || "—");

        document.title = `GLAMOPH — ${resolvedTitle}`;

        els.title.textContent = resolvedTitle;
        els.artworkId.textContent = resolvedArtworkId;
        els.edition.textContent = resolvedEdition;

        const imageSrc = resolveAssetPath(data.image || "", "image");
        if (imageSrc) {
          els.image.src = imageSrc;
          els.image.alt = resolvedTitle;
        } else {
          els.image.removeAttribute("src");
          els.image.alt = "";
        }

        els.signature.src = resolveAssetPath("signature.png", "signature");
        els.record.innerHTML = buildRecordRows(data);

        applyOwnerStateLabels();

        if (state.isOwnerEntry) {
          openCollectorGate(resolvedTitle);
        } else {
          closeCollectorGate();
        }

        if (state.isOwnerClaimed) {
          runClaimReveal();
        }

        els.downloadBtn.onclick = () => {
          document.documentElement.classList.add("is-printing");

          const originalTitle = document.title;
          document.title = `GLAMOPH-${resolvedArtworkId}`;

          setTimeout(() => {
            window.print();

            setTimeout(() => {
              document.title = originalTitle;
              document.documentElement.classList.remove("is-printing");
            }, 300);
          }, 80);
        };
      }

      function showError(id, detailText) {
        document.title = "GLAMOPH — Record Not Found";
        els.verified.textContent = "Record Unavailable";
        els.ownerNote.hidden = true;
        els.title.textContent = "Record not found";
        els.artworkId.textContent = id || "—";
        els.edition.textContent = "—";
        els.image.removeAttribute("src");
        els.image.alt = "";
        els.signature.src = resolveAssetPath("signature.png", "signature");

        els.record.innerHTML = `
          <div class="archive-record__row">
            <dt>Status</dt>
            <dd>The requested record could not be loaded.</dd>
          </div>
          <div class="archive-record__row">
            <dt>Details</dt>
            <dd>${escapeHtml(detailText || "Unknown error")}</dd>
          </div>
        `;
      }

      async function init() {
        const publicId = getIdFromUrl();

        if (!publicId) {
          document.body.innerHTML = `
            <main class="archive-intro">
              <div class="archive-intro__inner">
                <p class="archive-intro__label">GLAMOPH ARCHIVE</p>
                <h1 class="archive-intro__title">Artwork Verification</h1>
                <p class="archive-intro__text">
                  Each artwork is individually recorded and verified.
                </p>
              </div>
            </main>
          `;
          return;
        }

        state.publicId = publicId;
        state.token = getTokenFromUrl();
        state.claimKey = state.token ? getClaimKey(publicId, state.token) : null;
        state.isOwnerClaimed = !!(state.claimKey && localStorage.getItem(state.claimKey) === "true");
        state.isOwnerEntry = !!(state.token && !state.isOwnerClaimed);

        const basePath = getBasePath();

        els.claimBtn.addEventListener("click", () => {
          if (!state.claimKey) return;
          localStorage.setItem(state.claimKey, "true");
          state.isOwnerEntry = false;
          state.isOwnerClaimed = true;
          closeCollectorGate();
          applyOwnerStateLabels();
          runClaimReveal();
        });

        try {
          const internalId = await resolveRecordPath(publicId, basePath);

          if (!internalId) {
            showError(publicId, `No mapping found in records-log.json for ${publicId}`);
            return;
          }

          const jsonPath = `${basePath}/${RECORDS_DIR}/${encodeURIComponent(internalId)}/data.json`;
          const response = await fetch(jsonPath, { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          applyData(data, publicId);
        } catch (error) {
          console.error("Archive record load error:", error);
          showError(publicId, error.message || "Unknown error");
        }
      }

      init();
    })();
  </script>
</body>
</html>
