<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLAMOPH Certificate</title>
  <style>
    :root {
      --bg: #f3f0ea;
      --paper: #f7f4ee;
      --text: #111;
      --muted: #6f6a63;
      --line: rgba(17, 17, 17, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100vh;
    }

    .archive-page {
      width: 100%;
      padding: 36px 20px;
    }

    .archive-shell {
      max-width: 1120px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 40px 42px 28px;
    }

    .archive-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 34px;
    }

    .archive-verified {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .archive-brand {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .archive-hero {
      display: grid;
      grid-template-columns: minmax(300px, 0.9fr) minmax(300px, 1.1fr);
      gap: 44px;
      align-items: start;
      margin-bottom: 34px;
    }

    .archive-artwork img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
      border: 1px solid var(--line);
      background: #fff;
    }

    .archive-meta {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .archive-title {
      margin: 0 0 14px;
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-weight: 300;
      font-size: clamp(40px, 5.4vw, 72px);
      line-height: 0.95;
      letter-spacing: 0.01em;
    }

    .archive-subline {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin-bottom: 28px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .archive-subline span {
      display: inline-block;
    }

    .archive-grid {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 10px 18px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
    }

    .archive-label,
    .archive-value {
      font-size: 13px;
      line-height: 1.7;
    }

    .archive-label {
      color: var(--muted);
    }

    .archive-value a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(17, 17, 17, 0.3);
    }

    .archive-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-top: 34px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
    }

    .archive-download {
      appearance: none;
      border: 1px solid rgba(17, 17, 17, 0.22);
      background: transparent;
      color: var(--text);
      padding: 11px 16px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .archive-download:hover {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .archive-signature-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-height: 42px;
    }

    .archive-signature-wrap img {
      display: block;
      max-width: 180px;
      max-height: 42px;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .is-hidden {
      display: none !important;
    }

    .archive-error {
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .archive-error h1 {
      margin: 0 0 14px;
      font-size: 28px;
      font-weight: 500;
    }

    .archive-error p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 12mm;
      }

      html, body {
        background: #fff;
      }

      .archive-page {
        padding: 0;
      }

      .archive-shell {
        max-width: none;
        border: none;
        padding: 0;
        background: #fff;
      }

      .archive-download {
        display: none !important;
      }
    }

    @media (max-width: 820px) {
      .archive-page {
        padding: 20px 14px;
      }

      .archive-shell {
        padding: 28px 22px 24px;
      }

      .archive-header {
        margin-bottom: 24px;
      }

      .archive-hero {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .archive-title {
        max-width: none;
        font-size: clamp(38px, 10vw, 58px);
      }

      .archive-grid {
        grid-template-columns: 110px 1fr;
        gap: 8px 14px;
      }

      .archive-footer {
        align-items: flex-start;
        flex-direction: column;
      }

      .archive-signature-wrap {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="archive-page" id="archivePage">
    <section class="archive-shell">
      <header class="archive-header">
        <div class="archive-verified" id="verified">Artwork Verified</div>
        <div class="archive-brand">GLAMOPH</div>
      </header>

      <section class="archive-hero">
        <figure class="archive-artwork">
          <img id="artImage" alt="" />
        </figure>

        <div class="archive-meta">
          <h1 class="archive-title" id="title">Untitled</h1>

          <div class="archive-subline">
            <span id="artworkId">GLA-XXXX-X-000</span>
            <span id="edition">Edition 00 / 00</span>
          </div>

          <div class="archive-grid">
            <div class="archive-label">Artist</div>
            <div class="archive-value" id="artist">—</div>

            <div class="archive-label">Medium</div>
            <div class="archive-value" id="medium">—</div>

            <div class="archive-label">Size</div>
            <div class="archive-value" id="size">—</div>

            <div class="archive-label">Frame</div>
            <div class="archive-value" id="frame">—</div>

            <div class="archive-label">Archive Date</div>
            <div class="archive-value" id="archiveDate">—</div>

            <div class="archive-label">Archive URL</div>
            <div class="archive-value">
              <a id="archiveUrl" href="#" target="_blank" rel="noopener noreferrer">—</a>
            </div>
          </div>
        </div>
      </section>

      <footer class="archive-footer">
        <button class="archive-download" id="downloadBtn" type="button">
          Download PDF
        </button>

        <div class="archive-signature-wrap">
          <img id="signature" alt="Signature" />
        </div>
      </footer>
    </section>
  </main>

  <section class="archive-error is-hidden" id="errorBox">
    <h1>Record not found</h1>
    <p id="errorMessage">The requested certificate record could not be loaded.</p>
  </section>

  <script>
    function getSlugFromPath() {
      const path = window.location.pathname.replace(/^\/+|\/+$/g, '');
      return path || null;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setText(id, value, fallback = '—') {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = value || fallback;
    }

    function setImage(id, src, fallbackAlt = '') {
      const el = document.getElementById(id);
      if (!el) return;

      if (!src) {
        el.classList.add('is-hidden');
        return;
      }

      el.src = src;
      el.alt = fallbackAlt;
      el.classList.remove('is-hidden');
    }

    function setLink(id, href, fallback = '—') {
      const el = document.getElementById(id);
      if (!el) return;

      if (!href) {
        el.textContent = fallback;
        el.removeAttribute('href');
        return;
      }

      el.href = href;
      el.textContent = href;
    }

    function resolveRecordUrl(slug) {
      return `/records/${encodeURIComponent(slug)}/data.json`;
    }

    function resolveImageUrl(record, slug) {
      if (!record.image) return '';
      if (/^https?:\/\//i.test(record.image)) return record.image;
      return `/records/${encodeURIComponent(slug)}/${record.image}`;
    }

    function resolveSignatureUrl(record) {
      if (!record.signature) return '';
      if (/^https?:\/\//i.test(record.signature)) return record.signature;
      return `/assets/${record.signature}`;
    }

    function showError(message) {
      document.getElementById('archivePage').classList.add('is-hidden');
      document.getElementById('errorBox').classList.remove('is-hidden');
      document.getElementById('errorMessage').textContent = message;
    }

    function renderRecord(data, slug) {
      document.title = data.title
        ? `${data.title} — GLAMOPH Certificate`
        : 'GLAMOPH Certificate';

      setText('verified', data.verified || 'Artwork Verified');
      setText('title', data.title);
      setText('artworkId', data.artworkId);
      setText('edition', data.edition);
      setText('artist', data.artist);
      setText('medium', data.medium);
      setText('size', data.size);
      setText('frame', data.frame);
      setText('archiveDate', data.archiveDate);
      setLink('archiveUrl', data.archiveUrl);

      setImage('artImage', resolveImageUrl(data, slug), data.title || 'Artwork');
      setImage('signature', resolveSignatureUrl(data), 'Signature');
    }

    async function init() {
      const slug = getSlugFromPath();

      if (!slug) {
        showError('No certificate slug was found in the URL.');
        return;
      }

      try {
        const response = await fetch(resolveRecordUrl(slug), { cache: 'no-store' });

        if (!response.ok) {
          throw new Error(`Failed to load record: ${response.status}`);
        }

        const data = await response.json();
        renderRecord(data, slug);
      } catch (error) {
        showError('The requested certificate record could not be loaded.');
        console.error(error);
      }
    }

    document.getElementById('downloadBtn').addEventListener('click', () => {
      window.print();
    });

    init();
  </script>
</body>
</html>
